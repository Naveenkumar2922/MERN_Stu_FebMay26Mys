<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS console useage and simple manipulation</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1 class="text-2xl font-bold">My first javascript</h1>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">run</button>
    <pre id="out">
    </pre>
    <script> const out = document.getElementById("out");
    // function which accepts variable no of arguments (args)
    function print(...args){
        // console
        console.log(...args);
        out.textContent+=args.join("")+"\n";
    }
    function run(){
         print("hello from  javascript")
        print("4+3=",4+3);
        document.body.style.background = "#1EE69D";
    }
    document.getElementById("runBtn").addEventListener
    ("click",run);
       
    </script>
</body>
</html>
