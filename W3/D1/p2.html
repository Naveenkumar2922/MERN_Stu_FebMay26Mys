
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Variables var,let,const</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">
    </pre>
     <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">run</button>
    <script>
        const out = document.getElementById("out");

        function print(...args){
        // console
        console.log(...args);
        out.textContent+=args.join("")+"\n";   
    }

        function clearOut(){
            out.textContent = "";
        }

        function run(){
            clearOut();
            var a = 10;
        var a = 20; //reassiseted
        print("var a=",a);

        let b = 5;
        b = 15;
        //let b = 19; // creates an error when it is uncommented
        print("value of let b=",b);

        const pi=3.1415;
        //pi = 2.13 ;
        print("value of const pi=",pi); 
        }
        document.getElementById("runBtn").addEventListener
    ("click",run);
    
    </script>
</body>
</html>
